name: CI

on:
  push:
    branches: [ main, feat/** ]
  pull_request:
  workflow_dispatch:

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: |
          pip install -e .[dev]
      - name: Lint
        run: |
          ruff check .
      - name: Unit tests
        run: |
          pytest tests/unit -q

  integration:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: |
          pip install -e .[dev]
      - name: Start server
        run: |
          nohup uvicorn "mlx_gui.server:create_app" --host 0.0.0.0 --port 8000 >/tmp/server.log 2>&1 &
          sleep 5
          echo Server started
      - name: Integration tests
        env:
          MLX_GUI_BASE_URL: http://localhost:8000
        run: |
          pytest tests/integration -m integration -q